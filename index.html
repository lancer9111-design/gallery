<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Visual Core Gallery</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0f0f0f; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
}
.pg-site-title { max-width: 1100px; margin: 0 auto; padding: 40px 20px 12px; }
.pg-site-title h1 { font-size: clamp(30px,5vw,56px); line-height:1; letter-spacing:-0.04em; font-weight:700; }
.pg-site-title p { margin:10px 0 0; max-width:560px; color:rgba(255,255,255,.55); font-size:15px; line-height:1.6; }
.pg-wrap { max-width:1100px; margin:0 auto; padding:28px 20px 60px; }
.pg-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
@media (max-width:800px) { .pg-grid { grid-template-columns:repeat(2,1fr); gap:12px; } }
.pg-album {
  position:relative; cursor:pointer; border-radius:12px; overflow:hidden;
  aspect-ratio:3/4; background:#111; transition:transform .2s,box-shadow .2s;
}
.pg-album:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
.pg-album img { width:100%; height:100%; object-fit:cover; display:block; }
.pg-album-label {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  color:#fff; padding:40px 14px 14px; font-size:15px; font-weight:600;
  pointer-events:none;
}
.pg-album-count { font-size:12px; font-weight:400; opacity:.75; margin-top:3px; }
.pg-loading,.pg-error {
  color:rgba(255,255,255,.7); background:#111; border-radius:12px;
  padding:28px 18px; text-align:center; font-size:14px;
}
.pg-footer { max-width:1100px; margin:0 auto; padding:0 20px 48px; }
.pg-footer-divider { border:none; border-top:1px solid rgba(255,255,255,.1); margin-bottom:28px; }
.pg-footer-inner { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.pg-footer-copy { color:rgba(255,255,255,.3); font-size:13px; }
.pg-linktree-btn {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75); text-decoration:none;
  padding:9px 16px; border-radius:999px; font-size:13px; font-weight:500;
  transition:background .15s,color .15s,border-color .15s;
}
.pg-linktree-btn:hover { background:rgba(255,255,255,.13); color:#fff; border-color:rgba(255,255,255,.25); }
.pg-linktree-btn svg { width:16px; height:16px; flex-shrink:0; }
.pg-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.94); flex-direction:column; }
.pg-overlay.open { display:flex; }
.pg-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; color:#fff; flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.1);
  min-height:56px;
}
.pg-topbar h2 { font-size:16px; font-weight:600; margin:0; }
.pg-close {
  background:none; border:none; color:#fff; cursor:pointer;
  opacity:.7; padding:6px; display:flex; align-items:center;
  flex-shrink:0; margin-left:12px;
}
.pg-close:hover { opacity:1; }
.pg-close svg { width:26px; height:26px; }
.pg-inner-grid {
  flex:1; overflow-y:auto; padding:18px 20px 28px;
  display:grid; grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px; align-content:start;
}
@media (min-width:600px) { .pg-inner-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
@media (min-width:900px) { .pg-inner-grid { grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; } }
.pg-thumb { width:100%; aspect-ratio:3/4; border-radius:10px; overflow:hidden; cursor:zoom-in; background:#111; }
.pg-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .15s; }
.pg-thumb:hover img { opacity:.85; }
.pg-single {
  display:none; position:fixed; inset:0; z-index:10000;
  background:rgba(0,0,0,.97); flex-direction:column; overflow:hidden;
}
.pg-single.open { display:flex; }
.pg-single-topbar {
  display:flex; align-items:center; justify-content:flex-end;
  padding:10px 16px; flex-shrink:0;
}
.pg-single-close {
  background:none; border:none; color:#fff;
  cursor:pointer; opacity:.75; padding:6px;
  display:flex; align-items:center;
}
.pg-single-close:hover { opacity:1; }
.pg-single-close svg { width:26px; height:26px; }
.pg-single-img-wrap {
  position:relative; display:flex; align-items:center; justify-content:center;
  flex:1; min-height:0; overflow:hidden;
}
.pg-single-img-wrap img {
  max-width:100%; max-height:100%; border-radius:8px; object-fit:contain;
  position:absolute;
  transition:opacity 0.25s ease; opacity:0; pointer-events:none;
}
.pg-single-img-wrap img.active { opacity:1; pointer-events:auto; }
.pg-pinterest-btn {
  position:absolute; bottom:14px; right:14px; z-index:5;
  display:flex; align-items:center; justify-content:center;
  background:#E60023; border:none; color:#fff;
  width:42px; height:42px; border-radius:50%;
  cursor:pointer; text-decoration:none;
  transition:background .15s,transform .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
.pg-pinterest-btn:hover { background:#c0001e; transform:scale(1.08); }
.pg-pinterest-btn:active { transform:scale(.95); }
.pg-pinterest-btn svg { width:20px; height:20px; }
.pg-caption-wrap { flex-shrink:0; padding:10px 20px 4px; text-align:center; }
.pg-caption-title { color:rgba(255,255,255,.95); font-size:clamp(14px,4vw,17px); font-weight:600; line-height:1.35; margin-bottom:4px; }
.pg-caption-meta { color:rgba(255,255,255,.45); font-size:clamp(12px,3.2vw,14px); }
.pg-single-nav {
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  gap:34px; padding:10px 0 20px;
  padding-bottom:max(20px, env(safe-area-inset-bottom));
}
.pg-nav-btn {
  background:rgba(255,255,255,.18); border:none; color:#fff;
  width:54px; height:54px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s,transform .15s;
}
.pg-nav-btn:hover { background:rgba(255,255,255,.3); }
.pg-nav-btn:active { transform:scale(.96); }
.pg-nav-btn svg { width:32px; height:32px; }
.pg-single-counter { font-size:14px; color:rgba(255,255,255,.6); min-width:72px; text-align:center; }
@media (max-width:600px) {
  .pg-site-title { padding:28px 14px 6px; }
  .pg-wrap { padding:18px 14px; }
  .pg-album { border-radius:10px; }
  .pg-topbar { padding:12px 14px; }
  .pg-inner-grid { padding:12px 12px 24px; gap:10px; }
  .pg-nav-btn { width:clamp(48px,13vw,60px); height:clamp(48px,13vw,60px); }
  .pg-nav-btn svg { width:clamp(26px,7vw,32px); height:clamp(26px,7vw,32px); }
  .pg-single-nav { gap:clamp(20px,8vw,36px); }
  .pg-pinterest-btn { width:38px; height:38px; }
  .pg-footer { padding:0 14px 40px; }
  .pg-footer-inner { justify-content:center; flex-direction:column; align-items:center; text-align:center; gap:12px; }
}
</style>
</head>
<body>
<section class="pg-site-title">
  <h1>Visual Core Gallery</h1>
  <p>A curated archive of AI-generated lookbooks and style collections, updated daily from our creative workflow.</p>
</section>
<div class="pg-wrap">
  <div class="pg-grid" id="pg-grid">
    <div class="pg-loading">Loading gallery...</div>
  </div>
</div>
<footer class="pg-footer">
  <hr class="pg-footer-divider">
  <div class="pg-footer-inner">
    <span class="pg-footer-copy">© 2026 Visual Core</span>
    <a href="https://linktr.ee/visual-core" target="_blank" rel="noopener noreferrer" class="pg-linktree-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.953 15.066c-.08.163-.08.324 0 .486l3.113 4.856c.08.163.244.244.406.244h1.056c.163 0 .325-.08.406-.244l3.113-4.856c.08-.162.08-.323 0-.486l-3.113-4.856a.47.47 0 0 0-.406-.244h-1.056a.47.47 0 0 0-.406.244L7.953 15.066zm.974-9.632c-.163 0-.325.08-.406.244L5.408 10.53c-.08.162-.08.323 0 .486l2.032 3.17a.47.47 0 0 0 .406.244h1.056c.163 0 .325-.08.406-.244.08-.163.08-.324 0-.487L7.34 10.53l1.969-3.07V5.678a.47.47 0 0 0-.406-.244H8.927zm6.146 0h-1.056a.47.47 0 0 0-.406.244v1.782l1.969 3.07-1.969 3.169c-.08.163-.08.324 0 .487.08.163.244.244.406.244h1.056c.163 0 .325-.08.406-.244l2.032-3.17c.08-.163.08-.324 0-.486l-2.032-3.852a.47.47 0 0 0-.406-.244z"/></svg>
      All Links
    </a>
  </div>
</footer>
<div class="pg-overlay" id="pg-overlay">
  <div class="pg-topbar">
    <h2 id="pg-title"></h2>
    <button class="pg-close" id="pg-close-btn" aria-label="Close collection">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="pg-inner-grid" id="pg-inner-grid"></div>
</div>
<div class="pg-single" id="pg-single">
  <div class="pg-single-topbar">
    <button class="pg-single-close" id="pg-single-close-btn" aria-label="Close image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="pg-single-img-wrap" id="pg-img-wrap">
    <a id="pg-pinterest-btn" class="pg-pinterest-btn" href="#" target="_blank" rel="noopener noreferrer" aria-label="Save to Pinterest">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>

    <div class="pg-caption-title" id="pg-caption-title"></div>

  <div class="pg-single-nav">
    <button class="pg-nav-btn" id="pg-prev-btn" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="pg-single-counter" id="pg-single-counter"></span>
    <button class="pg-nav-btn" id="pg-next-btn" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>
<script>
const DATA_URL = '/gallery-data.json';
const SITE_ORIGIN = window.location.origin;
let GALLERIES = [], currentGallery = 0, currentImg = 0, isTransitioning = false;
const grid = document.getElementById('pg-grid');
const overlay = document.getElementById('pg-overlay');
const single = document.getElementById('pg-single');
const imgWrap = document.getElementById('pg-img-wrap');
const pinterestBtn = document.getElementById('pg-pinterest-btn');
const captionTitle = document.getElementById('pg-caption-title');
const captionMeta = document.getElementById('pg-caption-meta');
const singleCounter = document.getElementById('pg-single-counter');
document.getElementById('pg-close-btn').onclick = pgClose;
document.getElementById('pg-single-close-btn').onclick = pgSingleClose;
document.getElementById('pg-prev-btn').onclick = () => pgNav(-1);
document.getElementById('pg-next-btn').onclick = () => pgNav(1);
function pgSlug(str) {
  return (str || '').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}
function pgTitleCase(str) {
  return (str || '').replace(/\b\w/g, c => c.toUpperCase());
}
function pgFormatDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    return String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + dt.getFullYear();
  } catch(e) { return d; }
}
function pgNormalizeUrl(url) {
  if (!url) return '';
  try {
    return new URL(url, SITE_ORIGIN).pathname.replace(/\/+$/, '') || '/';
  } catch(e) {
    return String(url).replace(SITE_ORIGIN, '').replace(/\/+$/, '') || '/';
  }
}
function pgNormalizeItem(item, gallery) {
  if (typeof item === 'string') {
    return { url:item, title:'', category:gallery.name || '', date:'', order:null, cover:false, page_url:'', route_path:'' };
  }

  const rawOrder = item.order ?? item.Order ?? null;
  const parsedOrder = rawOrder === null || rawOrder === '' ? null : Number(rawOrder);
  const category = item.category || item.Category || gallery.name || '';

  const pageUrlRaw =
    item.pageurl ??
    item.page_url ??
    item.Page_url ??
    item.pageUrl ??
    '';

  const pageUrl = String(pageUrlRaw).trim();

  let routePath = '';
  if (pageUrl) {
    if (/^\d+$/.test(pageUrl)) {
      routePath = '/' + gallery.slug + '/' + pageUrl;
    } else {
      routePath = pgNormalizeUrl(pageUrl);
    }
  }

  return {
    url: item.url || item.URL || item.Img_url || item['Image URL'] || '',
    title: item.title || item.Title || item['Img Title'] || item.img_title || '',
    category,
    date: item.date || item.Date || '',
    order: Number.isFinite(parsedOrder) ? parsedOrder : null,
    cover: !!(item.cover || item.Cover),
    page_url: pageUrl,
    route_path: routePath
  };
}
function pgGetFallbackPath(gallery, item, index) {
  const slug = gallery.slug;
  const suffix = Number.isFinite(item.order) ? String(item.order) : String(index + 1);
  return '/' + slug + '/' + suffix;
}
function pgGetItemPath(gallery, item, index) {
  return item.route_path && item.route_path !== '/' ? item.route_path : pgGetFallbackPath(gallery, item, index);
}
function pgGetCollectionPath(gallery) {
  return '/' + gallery.slug;
}
function pgGetPathParts() {
  return window.location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
}
async function pgLoadData() {
  try {
    const res = await fetch(DATA_URL, { cache:'no-store' });
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    GALLERIES = (Array.isArray(data) ? data : data.galleries || []).map(g => {
      const rawName = g.name || g.category || 'uncategorized';
      const slug = pgSlug(rawName);
      const baseGallery = { name: pgTitleCase(rawName), slug };
      const images = (g.images || []).map(i => pgNormalizeItem(i, baseGallery)).filter(i => i.url);
      images.sort((a, b) => {
        const ao = Number.isFinite(a.order) ? a.order : -Infinity;
        const bo = Number.isFinite(b.order) ? b.order : -Infinity;
        return bo - ao;
      });
      const manualCover = images.find(i => i.cover);
      const cover = g.cover || g.coverUrl || (manualCover ? manualCover.url : '') || (images[0]?.url || '');
      return { ...baseGallery, cover, images };
    }).filter(g => g.images.length > 0);
    pgRenderAlbums();
    pgHandleRoute();
  } catch(e) {
    grid.innerHTML = '<div class="pg-error">Gallery failed to load.</div>';
  }
}
function pgRenderAlbums() {
  grid.innerHTML = '';
  if (!GALLERIES.length) {
    grid.innerHTML = '<div class="pg-error">No gallery items found.</div>';
    return;
  }
  GALLERIES.forEach((g, i) => {
    const div = document.createElement('div');
    div.className = 'pg-album';
    const img = document.createElement('img');
    img.src = g.cover;
    img.alt = g.name;
    img.loading = 'lazy';
    const label = document.createElement('div');
    label.className = 'pg-album-label';
    label.innerHTML = g.name + '<div class="pg-album-count">' + g.images.length + ' Images</div>';
    div.appendChild(img);
    div.appendChild(label);
    div.onclick = () => pgOpen(i);
    grid.appendChild(div);
  });
}
function pgOpen(i, skipPathUpdate) {
  currentGallery = i;
  const g = GALLERIES[i];
  document.getElementById('pg-title').textContent = g.name;
  const inner = document.getElementById('pg-inner-grid');
  inner.innerHTML = '';
  g.images.forEach((item, j) => {
    const d = document.createElement('div');
    d.className = 'pg-thumb';
    const img = document.createElement('img');
    img.src = item.url;
    img.alt = item.title || g.name;
    img.loading = 'lazy';
    d.appendChild(img);
    d.onclick = () => pgSingleOpen(j);
    inner.appendChild(d);
  });
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!skipPathUpdate) history.replaceState(null, '', pgGetCollectionPath(g));
}
function pgClose() {
  overlay.classList.remove('open');
  single.classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', '/');
}
function pgBuildImages(gallery) {
  Array.from(imgWrap.querySelectorAll('img')).forEach(el => el.remove());
  gallery.images.forEach((item, j) => {
    const img = document.createElement('img');
    img.src = item.url;
    img.alt = item.title || gallery.name;
    img.loading = 'lazy';
    if (j === currentImg) img.classList.add('active');
    imgWrap.insertBefore(img, pinterestBtn);
  });
}
function pgSetCaption(item) {
  captionTitle.textContent = item.title || '';
  const noText = Number.isFinite(item.order) ? 'No.' + item.order : '';
  captionMeta.textContent = [
    pgTitleCase(item.category),
    pgFormatDate(item.date),
    noText
  ].filter(Boolean).join(' | ');
}
function pgUpdatePinterest(gallery, item, index) {
  const pagePath = pgGetItemPath(gallery, item, index);
  const pageUrl = encodeURIComponent(SITE_ORIGIN + pagePath);
  const mediaUrl = encodeURIComponent(item.url);
  const desc = encodeURIComponent([item.title, pgTitleCase(item.category)].filter(Boolean).join(' · '));
  pinterestBtn.href = 'https://pinterest.com/pin/create/button/?url=' + pageUrl + '&media=' + mediaUrl + '&description=' + desc;
}
function pgSingleOpen(j, skipPathUpdate) {
  currentImg = j;
  const g = GALLERIES[currentGallery];
  pgBuildImages(g);
  pgSetCaption(g.images[j]);
  pgUpdatePinterest(g, g.images[j], j);
  singleCounter.textContent = (j + 1) + ' / ' + g.images.length;
  single.classList.add('open');
  if (!skipPathUpdate) history.replaceState(null, '', pgGetItemPath(g, g.images[j], j));
}
function pgSingleClose() {
  single.classList.remove('open');
  history.replaceState(null, '', pgGetCollectionPath(GALLERIES[currentGallery]));
}
function pgNav(dir) {
  if (isTransitioning) return;
  const g = GALLERIES[currentGallery];
  const allImgs = imgWrap.querySelectorAll('img');
  if (!allImgs.length) return;
  allImgs[currentImg].classList.remove('active');
  currentImg = (currentImg + dir + g.images.length) % g.images.length;
  allImgs[currentImg].classList.add('active');
  isTransitioning = true;
  setTimeout(() => { isTransitioning = false; }, 300);
  pgSetCaption(g.images[currentImg]);
  pgUpdatePinterest(g, g.images[currentImg], currentImg);
  singleCounter.textContent = (currentImg + 1) + ' / ' + g.images.length;
  history.replaceState(null, '', pgGetItemPath(g, g.images[currentImg], currentImg));
}
function pgHandleRoute() {
  const currentPath = window.location.pathname.replace(/\/+$/, '') || '/';
  if (currentPath === '/') return;
  const parts = pgGetPathParts();
  if (!parts.length) return;
  const slug = parts[0];
  const ci = GALLERIES.findIndex(g => g.slug === slug);
  if (ci < 0) return;
  const gallery = GALLERIES[ci];
  if (parts.length === 1) {
    pgOpen(ci, true);
    return;
  }
  const ii = gallery.images.findIndex((img, index) => {
    const itemPath = pgGetItemPath(gallery, img, index);
    return itemPath === currentPath;
  });
  if (ii >= 0) {
    pgOpen(ci, true);
    pgSingleOpen(ii, true);
    return;
  }
  pgOpen(ci, true);
}
overlay.addEventListener('click', e => { if (e.target === overlay) pgClose(); });
single.addEventListener('click', e => { if (e.target === single) pgSingleClose(); });
document.addEventListener('keydown', e => {
  const open = single.classList.contains('open');
  if (e.key === 'Escape') { if (open) pgSingleClose(); else pgClose(); }
  if (!open) return;
  if (e.key === 'ArrowRight') pgNav(1);
  if (e.key === 'ArrowLeft') pgNav(-1);
});
window.addEventListener('popstate', () => {
  overlay.classList.remove('open');
  single.classList.remove('open');
  document.body.style.overflow = '';
  pgHandleRoute();
});
let tx = 0;
single.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
single.addEventListener('touchend', e => {
  if (!single.classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) pgNav(dx < 0 ? 1 : -1);
}, { passive:true });
pgLoadData();
</script>
</body>
</html>
