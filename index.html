<style>
  .pg-wrap { font-family: inherit; max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .pg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .pg-album {
    position: relative; cursor: pointer; border-radius: 12px; overflow: hidden;
    aspect-ratio: 4/3; background: #111;
    transition: transform .2s, box-shadow .2s;
  }
  .pg-album:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.35); }
  .pg-album img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pg-album-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    color: #fff; padding: 36px 14px 14px; font-size: 15px; font-weight: 600;
  }
  .pg-album-count { font-size: 12px; font-weight: 400; opacity: .8; margin-top: 3px; }

  .pg-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.93); flex-direction: column;
  }
  .pg-overlay.open { display: flex; }
  .pg-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; color: #fff; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .pg-topbar h2 { font-size: 16px; font-weight: 600; margin: 0; }
  .pg-close { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; opacity: .7; padding: 0 4px; }
  .pg-close:hover { opacity: 1; }

  .pg-inner-grid {
    flex: 1; overflow-y: auto; padding: 16px 20px 24px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    align-content: start;
  }
  @media (min-width: 600px) {
    .pg-inner-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  }
  @media (min-width: 900px) {
    .pg-inner-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  }

  .pg-thumb { border-radius: 8px; overflow: hidden; cursor: zoom-in; background: #111; }
  .pg-thumb img { width: 100%; height: auto; display: block; transition: opacity .15s; }
  .pg-thumb:hover img { opacity: .8; }

  .pg-single {
    display: none; position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,.97); align-items: center; justify-content: center; flex-direction: column;
  }
  .pg-single.open { display: flex; }
  .pg-single img { max-width: 90vw; max-height: 78vh; border-radius: 6px; object-fit: contain; }
  .pg-single-nav { display: flex; align-items: center; gap: 20px; margin-top: 18px; color: #fff; }
  .pg-nav-btn {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    width: 56px; height: 56px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .pg-nav-btn:hover { background: rgba(255,255,255,.3); }
  .pg-nav-btn:active { background: rgba(255,255,255,.4); transform: scale(0.95); }
  .pg-single-counter { font-size: 13px; color: rgba(255,255,255,.6); min-width: 64px; text-align: center; }
  .pg-single-close {
    position: fixed; top: 16px; right: 20px; background: none; border: none;
    color: #fff; font-size: 30px; cursor: pointer; z-index: 10001; opacity: .7;
  }
  .pg-single-close:hover { opacity: 1; }

  /* 移动端适配：箭头放大 + 图片压一压 */
  @media (max-width: 600px) {
    .pg-single img { max-height: 62vh; }
    .pg-nav-btn { width: 80px; height: 80px; }
    .pg-nav-btn svg { width: 38px; height: 38px; }
    .pg-single-nav { gap: 36px; margin-top: 22px; }
    #pg-single-caption { font-size: 15px !important; margin-top: 14px !important; padding: 0 20px; }
  }
  @media (max-width: 380px) {
    .pg-nav-btn { width: 70px; height: 70px; }
    .pg-nav-btn svg { width: 32px; height: 32px; }
    .pg-single-nav { gap: 24px; }
    .pg-single img { max-height: 58vh; }
  }

  @media (max-width: 600px) {
    .pg-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }
</style>

<div class="pg-wrap">
  <div class="pg-grid" id="pg-grid"></div>
</div>

<div class="pg-overlay" id="pg-overlay" onclick="pgOverlayClick(event)">

    </button>
  </div>
  <div class="pg-inner-grid" id="pg-inner-grid"></div>
</div>

<div class="pg-single" id="pg-single" onclick="pgSingleClick(event)">

      ${g.name}
      <div class="pg-album-count">${g.images.length} 张图片</div>
    </div>`;
  div.onclick = () => pgOpen(i);
  grid.appendChild(div);
});

let currentGallery = 0, currentImg = 0;

function pgOpen(i) {
  currentGallery = i;
  const g = GALLERIES[i];
  document.getElementById('pg-title').textContent = g.name;
  const inner = document.getElementById('pg-inner-grid');
  inner.innerHTML = '';
  g.images.forEach((item, j) => {
    const url = typeof item === 'string' ? item : item.url;
    const d = document.createElement('div');
    d.className = 'pg-thumb';
    d.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
    d.onclick = () => pgSingleOpen(j);
    inner.appendChild(d);
  });
  document.getElementById('pg-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function pgClose() {
  document.getElementById('pg-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function pgSingleOpen(j) {
  currentImg = j;
  const g = GALLERIES[currentGallery];
  const item = g.images[j];
  // support both plain URL string and {url, category, title} object
  const url = typeof item === 'string' ? item : item.url;
  const itemCategory = typeof item === 'object' && item.category ? item.category : '';
  const itemTitle = typeof item === 'object' && item.title ? item.title : '';
  // 优先用 image 自己的 category / title，否则 fallback 到 collection 级别的
  const category = itemCategory || g.category || '';
  const title = itemTitle;
  document.getElementById('pg-single-img').src = url;
  document.getElementById('pg-single-counter').textContent = (j+1) + ' / ' + g.images.length;
  // show "Category | Title" or just one if only one exists
  const caption = [category, title].filter(Boolean).join(' | ');
  document.getElementById('pg-single-caption').textContent = caption;
  document.getElementById('pg-single').classList.add('open');
}

function pgSingleClose() {
  document.getElementById('pg-single').classList.remove('open');
}

function pgNav(dir) {
  const imgs = GALLERIES[currentGallery].images;
  currentImg = (currentImg + dir + imgs.length) % imgs.length;
  pgSingleOpen(currentImg);
}

function pgOverlayClick(e) {
  if (e.target === document.getElementById('pg-overlay')) pgClose();
}

function pgSingleClick(e) {
  if (e.target === document.getElementById('pg-single')) pgSingleClose();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { pgSingleClose(); pgClose(); }
  if (e.key === 'ArrowRight') pgNav(1);
  if (e.key === 'ArrowLeft') pgNav(-1);
});

// 触摸滑动支持
let _tx = 0;
const single = document.getElementById('pg-single');
single.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
single.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 40) pgNav(dx < 0 ? 1 : -1);
}, { passive: true });
</script>
