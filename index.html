<style>
  .pg-wrap { font-family: inherit; max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .pg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .pg-album {
    position: relative; cursor: pointer; border-radius: 12px; overflow: hidden;
    aspect-ratio: 4/3; background: #111;
    transition: transform .2s, box-shadow .2s;
  }
  .pg-album:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.35); }
  .pg-album img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pg-album-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    color: #fff; padding: 36px 14px 14px; font-size: 15px; font-weight: 600;
  }
  .pg-album-count { font-size: 12px; font-weight: 400; opacity: .8; margin-top: 3px; }

  .pg-loading,
  .pg-error {
    color: rgba(255,255,255,.75);
    background: #111;
    border-radius: 12px;
    padding: 28px 18px;
    text-align: center;
    font-size: 14px;
  }

  .pg-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.93); flex-direction: column;
  }
  .pg-overlay.open { display: flex; }
  .pg-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; color: #fff; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .pg-topbar h2 { font-size: 16px; font-weight: 600; margin: 0; }
  .pg-close { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; opacity: .7; padding: 0 4px; }
  .pg-close:hover { opacity: 1; }

  .pg-inner-grid {
    flex: 1; overflow-y: auto; padding: 16px 20px 24px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    align-content: start;
  }
  @media (min-width: 600px) {
    .pg-inner-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  }
  @media (min-width: 900px) {
    .pg-inner-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  }

  .pg-thumb { border-radius: 8px; overflow: hidden; cursor: zoom-in; background: #111; }
  .pg-thumb img { width: 100%; height: auto; display: block; transition: opacity .15s; }
  .pg-thumb:hover img { opacity: .8; }

  .pg-single {
    display: none; position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,.97); align-items: center; justify-content: center; flex-direction: column;
  }
  .pg-single.open { display: flex; }
  .pg-single img { max-width: 90vw; max-height: 80vh; border-radius: 6px; object-fit: contain; }
  .pg-single-nav { display: flex; align-items: center; gap: 20px; margin-top: 16px; color: #fff; }
  .pg-nav-btn {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    width: 52px; height: 52px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .pg-nav-btn:hover { background: rgba(255,255,255,.3); }

  @media (max-width: 600px) {
    .pg-nav-btn {
      width: clamp(68px, 17vw, 82px);
      height: clamp(68px, 17vw, 82px);
    }
    .pg-nav-btn svg {
      width: clamp(36px, 9vw, 44px);
      height: clamp(36px, 9vw, 44px);
    }
    .pg-single-nav {
      gap: clamp(26px, 7vw, 42px);
      margin-top: 22px;
    }
    .pg-single img {
      max-width: 92vw;
      max-height: 74vh;
    }
  }

  .pg-single-counter { font-size: 13px; color: rgba(255,255,255,.6); min-width: 64px; text-align: center; }
  .pg-single-close {
    position: fixed; top: 16px; right: 20px; background: none; border: none;
    color: #fff; font-size: 30px; cursor: pointer; z-index: 10001; opacity: .7;
  }
  .pg-single-close:hover { opacity: 1; }

  #pg-single-caption {
    color: rgba(255,255,255,.85);
    font-size: 14px;
    line-height: 1.4;
    margin-top: 12px;
    letter-spacing: .02em;
    text-align: center;
    padding: 0 16px;
    max-width: 92vw;
  }

  @media (max-width: 600px) {
    .pg-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    #pg-single-caption { font-size: 14px; margin-top: 12px; }
  }

/* ===============================
   Mobile Gallery UI Enhancement
   只优化展示，不影响 gallery-data.json 动态数据
   =============================== */

/* Collection 点进去后的缩略图区域：移动端放大图片 */
@media (max-width: 600px) {
  .pg-inner-grid {
    padding: 12px 14px 28px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .pg-thumb {
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 9px;
  }

  .pg-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
}

/* 稍宽一点的手机 / 小平板：自动变成 3 列 */
@media (min-width: 520px) and (max-width: 899px) {
  .pg-inner-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
}

/* 单图打开后：图片区域稍微让位给标题和导航 */
@media (max-width: 600px) {
  .pg-single img {
    max-width: 92vw;
    max-height: 72vh;
  }
}

/* 单图标题：放大，但保持一行 */
#pg-single-caption {
  font-size: clamp(15px, 3.8vw, 17px);
  line-height: 1.35;
  font-weight: 500;
  color: rgba(255,255,255,.9);
  margin-top: 14px;
  padding: 0 18px;
  max-width: 94vw;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 单图底部导航：移动端放大按钮和箭头 */
@media (max-width: 600px) {
  .pg-single-nav {
    gap: clamp(32px, 9vw, 52px);
    margin-top: 18px;
  }

  .pg-nav-btn {
    width: clamp(76px, 19vw, 92px);
    height: clamp(76px, 19vw, 92px);
    background: rgba(255,255,255,.18);
  }

  .pg-nav-btn svg {
    width: clamp(42px, 10vw, 52px);
    height: clamp(42px, 10vw, 52px);
  }

  .pg-single-counter {
    font-size: 14px;
    min-width: 58px;
  }
}

  
</style>

<div class="pg-wrap">
  <div class="pg-grid" id="pg-grid">
    <div class="pg-loading">Loading gallery...</div>
  </div>
</div>

<div class="pg-overlay" id="pg-overlay" onclick="pgOverlayClick(event)">
  <div class="pg-topbar">
    <h2 id="pg-title"></h2>
    <button class="pg-close" onclick="pgClose()" aria-label="关闭">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="pg-inner-grid" id="pg-inner-grid"></div>
</div>

<div class="pg-single" id="pg-single" onclick="pgSingleClick(event)">
  <button class="pg-single-close" onclick="pgSingleClose()" aria-label="关闭">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <img id="pg-single-img" src="" alt="">
  <div id="pg-single-caption"></div>

  <div class="pg-single-nav">
    <button class="pg-nav-btn" onclick="pgNav(-1)" aria-label="上一张">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <span class="pg-single-counter" id="pg-single-counter"></span>

    <button class="pg-nav-btn" onclick="pgNav(1)" aria-label="下一张">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
</div>

<script>
/*
  Data source:
  Make 从 Airtable 拉取 url/category/title 后，生成 gallery-data.json 并提交到 GitHub。
  页面只读取 gallery-data.json，不再把 Category / Title 写死在 HTML 里。
*/
const DATA_URL = "./gallery-data.json";

let GALLERIES = [];
let currentGallery = 0;
let currentImg = 0;

const grid = document.getElementById("pg-grid");
const overlay = document.getElementById("pg-overlay");
const single = document.getElementById("pg-single");
const singleImg = document.getElementById("pg-single-img");
const singleCaption = document.getElementById("pg-single-caption");
const singleCounter = document.getElementById("pg-single-counter");

async function pgLoadData() {
  try {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Failed to load gallery-data.json");

    const data = await res.json();

    // 支持两种格式：
    // 1. [ { name, cover, images: [...] } ]
    // 2. { galleries: [ { name, cover, images: [...] } ] }
    GALLERIES = Array.isArray(data) ? data : (data.galleries || []);

    GALLERIES = GALLERIES
      .map(gallery => {
        const images = Array.isArray(gallery.images) ? gallery.images : [];

        const cleanImages = images
          .map(item => pgNormalizeItem(item, gallery))
          .filter(item => item.url);

        return {
          name: gallery.name || gallery.collection || "Untitled Collection",
          cover: gallery.cover || gallery.cover_url || (cleanImages[0] ? cleanImages[0].url : ""),
          category: gallery.category || "",
          title: gallery.title || "",
          images: cleanImages
        };
      })
      .filter(gallery => gallery.images.length > 0);

    pgRenderAlbums();

  } catch (error) {
    console.error(error);
    grid.innerHTML = '<div class="pg-error">Gallery data failed to load. Please check gallery-data.json.</div>';
  }
}

function pgNormalizeItem(item, gallery) {
  // 支持旧格式：纯 URL 字符串
  if (typeof item === "string") {
    return {
      url: item,
      category: gallery.category || "",
      title: gallery.title || ""
    };
  }

  // 支持 Airtable / Make 常见字段名
  if (typeof item === "object" && item !== null) {
    return {
      url: item.url || item.image_url || item.imageUrl || item.image || "",
      category: item.category || item.Category || gallery.category || "",
      title: item.title || item.Title || item.name || item.Name || gallery.title || ""
    };
  }

  return { url: "", category: "", title: "" };
}

function pgGetCaption(item) {
  return [item.category, item.title].filter(Boolean).join(" | ");
}

function pgRenderAlbums() {
  grid.innerHTML = "";

  if (!GALLERIES.length) {
    grid.innerHTML = '<div class="pg-error">No gallery items found.</div>';
    return;
  }

  GALLERIES.forEach((g, i) => {
    const div = document.createElement("div");
    div.className = "pg-album";

    const img = document.createElement("img");
    img.src = g.cover;
    img.alt = g.name;
    img.loading = "lazy";

    const label = document.createElement("div");
    label.className = "pg-album-label";
    label.textContent = g.name;

    const count = document.createElement("div");
    count.className = "pg-album-count";
    count.textContent = g.images.length + " 张图片";

    label.appendChild(count);
    div.appendChild(img);
    div.appendChild(label);

    div.onclick = () => pgOpen(i);
    grid.appendChild(div);
  });
}

function pgOpen(i) {
  currentGallery = i;
  const g = GALLERIES[i];

  document.getElementById("pg-title").textContent = g.name;

  const inner = document.getElementById("pg-inner-grid");
  inner.innerHTML = "";

  g.images.forEach((item, j) => {
    const caption = pgGetCaption(item);

    const d = document.createElement("div");
    d.className = "pg-thumb";

    const img = document.createElement("img");
    img.src = item.url;
    img.alt = caption || g.name;
    img.loading = "lazy";

    d.appendChild(img);
    d.onclick = () => pgSingleOpen(j);

    inner.appendChild(d);
  });

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function pgClose() {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
}

function pgSingleOpen(j) {
  currentImg = j;

  const g = GALLERIES[currentGallery];
  const item = g.images[j];
  const caption = pgGetCaption(item);

  singleImg.src = item.url;
  singleImg.alt = caption || g.name;

  singleCounter.textContent = (j + 1) + " / " + g.images.length;

  // 这里完全来自 Airtable / Make 生成的数据，不写死
  singleCaption.textContent = caption;

  single.classList.add("open");
}

function pgSingleClose() {
  single.classList.remove("open");
}

function pgNav(dir) {
  const imgs = GALLERIES[currentGallery].images;
  currentImg = (currentImg + dir + imgs.length) % imgs.length;
  pgSingleOpen(currentImg);
}

function pgOverlayClick(e) {
  if (e.target === overlay) pgClose();
}

function pgSingleClick(e) {
  if (e.target === single) pgSingleClose();
}

document.addEventListener("keydown", e => {
  const singleOpen = single.classList.contains("open");

  if (e.key === "Escape") {
    pgSingleClose();
    pgClose();
  }

  if (!singleOpen) return;

  if (e.key === "ArrowRight") pgNav(1);
  if (e.key === "ArrowLeft") pgNav(-1);
});

// 触摸滑动支持
let _tx = 0;

single.addEventListener("touchstart", e => {
  _tx = e.touches[0].clientX;
}, { passive: true });

single.addEventListener("touchend", e => {
  if (!single.classList.contains("open")) return;

  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 40) pgNav(dx < 0 ? 1 : -1);
}, { passive: true });

pgLoadData();
</script>
